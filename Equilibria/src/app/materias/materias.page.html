<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/settings">
        <ion-icon slot="icon-only" name="settings-sharp"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>Equilibria</ion-title>

    <ion-buttons slot="end">
      <ion-button routerLink="/bienestar">
        <ion-icon slot="icon-only" name="rose-sharp"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">materias</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>
